# ============================================================
# Nivas PMS — docker-compose.prod.yml (PRODUCTION)
# Usage: docker compose -f docker-compose.prod.yml up --build -d
#
# Services:
#   postgres  — PostgreSQL 16 (no external port exposure)
#   backend   — Elysia + Bun (internal only)
#   frontend  — nginx serving SPA + proxying /api/* (port 80)
# ============================================================

name: nivas-prod

services:

  # ── PostgreSQL ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: nivas_db
    # No port exposure — internal only in production
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - nivas-net
    mem_swappiness: 0          # don't swap DB memory (swap thrash = latency death)
    deploy:
      resources:
        limits:
          memory: ${PG_MEM_LIMIT:-768M}
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nivas_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Redis ──────────────────────────────────────────────────
  # Shared cache + rate-limit + auth + WS pub/sub store. Required for the
  # caching/rate-limit/session features and for running multiple backend
  # replicas. allkeys-lru so it can't OOM under cache pressure.
  redis:
    image: redis:7-alpine
    restart: always
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis_data:/data
    networks:
      - nivas-net
    mem_swappiness: 0
    deploy:
      resources:
        limits:
          memory: ${REDIS_MEM_LIMIT:-320M}   # maxmemory 256mb + overhead
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ── Object storage (MinIO) ─────────────────────────────────
  # Self-hosted S3-compatible store for images + DB backups. Single-node,
  # internal-only API; expose :9000 behind your reverse proxy for public image
  # URLs / backup downloads (set MINIO_PUBLIC_URL to that address). Console (:9001)
  # is NOT published — reach it via an SSH tunnel for admin.
  minio:
    image: minio/minio:RELEASE.2025-04-08T15-41-24Z
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:?set MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:?set MINIO_SECRET_KEY}
      # Buckets are auto-created by the backend on boot; nothing else needed.
    volumes:
      - minio_data:/data
    # No published port — the frontend nginx proxies /storage/ → minio:9000 over
    # your domain's TLS. (Uncomment to reach the console/API directly for admin.)
    # ports:
    #   - "127.0.0.1:9001:9001"   # console, localhost-only (SSH-tunnel to use)
    networks:
      - nivas-net
    mem_swappiness: 0
    deploy:
      resources:
        limits:
          memory: ${MINIO_MEM_LIMIT:-384M}
    healthcheck:
      test: ["CMD-SHELL", "mc ready local 2>/dev/null || exit 0"]   # advisory only
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Backend ────────────────────────────────────────────────
  backend:
    build:
      context: ./nivas-backend
      dockerfile: Dockerfile
    restart: always
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@postgres:5432/nivas_db
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      JWT_EXPIRY: ${JWT_EXPIRY:-7d}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost}
      UPLOAD_DIR: public/uploads
      SUPER_ADMIN_EMAIL: ${SUPER_ADMIN_EMAIL:-admin@nivaspms.com}
      SUPER_ADMIN_PASSWORD: ${SUPER_ADMIN_PASSWORD:?set SUPER_ADMIN_PASSWORD}
      SUPER_ADMIN_NAME: ${SUPER_ADMIN_NAME:-Administrator}
      SUPER_ADMIN_PHONE: ${SUPER_ADMIN_PHONE:-}
      GUEST_PORTAL_URL: ${GUEST_PORTAL_URL:-http://localhost}
      CBMS_BILL_URL: ${CBMS_BILL_URL:-https://cbapi.ird.gov.np/api/bill}
      CBMS_RETURN_URL: ${CBMS_RETURN_URL:-https://cbapi.ird.gov.np/api/billreturn}
      # Object storage (images + DB backups) — bundled MinIO service below.
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio}     # internal service name
      MINIO_PORT: ${MINIO_PORT:-9000}
      MINIO_USE_SSL: ${MINIO_USE_SSL:-false}        # internal network → no TLS
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:?set MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:?set MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET:-nivas}
      # Browser-reachable storage URL (point a domain/reverse-proxy at MinIO :9000).
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:?set MINIO_PUBLIC_URL}
      MINIO_BACKUP_BUCKET: ${MINIO_BACKUP_BUCKET:-nivas-backups}
      BACKUP_KEEP: ${BACKUP_KEEP:-3}
      # Optional platform-wide AI fallback key (hotels can bring their own).
      AI_API_KEY: ${AI_API_KEY:-}
    # No external port — nginx proxies internally. Scale with:
    #   docker compose -f docker-compose.prod.yml up -d --scale backend=3
    volumes:
      - uploads_data:/usr/src/app/public/uploads
    networks:
      - nivas-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    mem_swappiness: 0          # OOM-kill + restart cleanly instead of swap-thrashing
    deploy:
      resources:
        limits:
          memory: ${BACKEND_MEM_LIMIT:-512M}
        reservations:
          memory: 256M
      restart_policy:
        condition: on-failure
        max_attempts: 5

  # ── Frontend (nginx) ───────────────────────────────────────
  frontend:
    build:
      context: ./nivas-frontend
      dockerfile: Dockerfile
    restart: always
    mem_swappiness: 0
    deploy:
      resources:
        limits:
          memory: ${FRONTEND_MEM_LIMIT:-128M}
    ports:
      - "${FRONTEND_PORT:-80}:80"
    networks:
      - nivas-net
    depends_on:
      - backend
      - minio
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

# ── Volumes ────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local

# ── Networks ───────────────────────────────────────────────
networks:
  nivas-net:
    driver: bridge
