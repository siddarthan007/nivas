# ============================================================
# Nivas PMS Frontend — nginx configuration (production)
# Serves React SPA + proxies /api/* and WebSocket to backend
# ============================================================

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip ─────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;

    # ── Security headers ─────────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Docker embedded DNS — re-resolve `backend` per request so that scaling
    # the backend (docker compose up --scale backend=N) load-balances across
    # all replicas. With a literal proxy_pass hostname nginx resolves only once
    # at startup and pins to a single replica.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # ── API proxy → backend:3000 (round-robins across replicas) ──
    location /api/ {
        set $api_upstream http://backend:3000;
        proxy_pass $api_upstream;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Disable buffering for streaming responses
        proxy_buffering off;
    }

    # ── Object storage proxy → MinIO :9000 ───────────────────
    # Serves uploaded images + presigned backup downloads under the main domain
    # over TLS, so MinIO never needs a public port. Set MINIO_PUBLIC_URL to
    # "https://<your-domain>/storage" so generated/presigned URLs route here.
    # The trailing slash strips "/storage" before forwarding to MinIO.
    location /storage/ {
        set $minio_upstream http://minio:9000;
        proxy_pass $minio_upstream/;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Large uploads/downloads; let MinIO stream without nginx buffering.
        client_max_body_size 50m;
        proxy_buffering off;
        proxy_connect_timeout 10s;
        proxy_read_timeout    300s;
    }

    # ── WebSocket proxy (notifications) ──────────────────────
    # A WS connection is long-lived and stays pinned to whichever replica it
    # lands on; cross-replica delivery is handled by Redis pub/sub in the
    # backend (WSService), so any replica can serve any client.
    location /ws {
        set $ws_upstream http://backend:3000;
        proxy_pass $ws_upstream;
        proxy_http_version 1.1;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── Static asset cache ───────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── SPA fallback ─────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
